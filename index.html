<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pizarra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --ink: #1a1a1a;
    --muted: #999;
    --border: #d8d4cb;
    --track-h: 72px;
  }

  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Topbar ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  #modeToggle {
    display: flex;
    border: 1.5px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }

  .mode-btn {
    background: transparent;
    border: none;
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: background .15s, color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn:first-child { border-right: 1.5px solid var(--border); }
  .mode-btn.active {
    background: var(--ink);
    color: var(--bg);
  }

  #historyToggle {
    background: transparent;
    border: 1.5px solid var(--border);
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  #historyToggle.has-items { color: var(--ink); border-color: var(--ink); }

  /* ── Board ── */
  #board {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
    position: relative;
  }

  /* Normal mode tracks */
  .track {
    width: 100%;
    height: var(--track-h);
    overflow: hidden;
    border-top: 1px solid var(--border);
    position: relative;
    display: flex;
    align-items: center;
  }
  .track:last-child { border-bottom: 1px solid var(--border); }
  .track:nth-child(even) { background: rgba(0,0,0,0.018); }

  .track-inner {
    display: flex;
    align-items: center;
    white-space: nowrap;
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
  }

  .track-text {
    font-family: 'DM Mono', monospace;
    font-size: 1.45rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink);
    padding: 0 48px;
    opacity: 0;
    transition: opacity .6s;
  }

  .track-sep {
    font-size: 1rem;
    color: var(--muted);
    padding: 0 8px;
    opacity: 0;
    transition: opacity .6s;
  }

  .track-text.visible,
  .track-sep.visible { opacity: 1; }

  .track-placeholder {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--border);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding-left: 22px;
    user-select: none;
  }

  .track-num {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--border);
    letter-spacing: 0.1em;
    z-index: 2;
    pointer-events: none;
    user-select: none;
  }

  .track::before, .track::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 40px;
    z-index: 1;
    pointer-events: none;
  }
  .track::before { left: 0;  background: linear-gradient(to right, var(--bg), transparent); }
  .track::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }
  .track:nth-child(even)::before { background: linear-gradient(to right, #f0ede5, transparent); }
  .track:nth-child(even)::after  { background: linear-gradient(to left,  #f0ede5, transparent); }

  /* Entrenamiento mode */
  #board.big {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  #big-inner {
    display: none;
    align-items: center;
    white-space: nowrap;
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
  }

  #board.big #big-inner { display: flex; }

  #big-inner .track-text {
    font-size: clamp(2.8rem, 10vw, 4.5rem);
    padding: 0 64px;
  }

  #big-inner .track-sep { font-size: 2rem; padding: 0 12px; }

  #big-placeholder {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--border);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding-left: 28px;
    user-select: none;
  }

  #board.big::before,
  #board.big::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 40px;
    z-index: 1;
    pointer-events: none;
  }
  #board.big::before { left: 0;  background: linear-gradient(to right, var(--bg), transparent); }
  #board.big::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }

  /* ── Historial overlay ── */
  #historyPanel {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    flex-direction: column;
    z-index: 10;
  }
  #historyPanel.open { display: flex; }

  #historyHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1.5px solid var(--ink);
    flex-shrink: 0;
  }

  #historyHeader span {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
  }

  #clearHistoryBtn {
    background: transparent;
    border: 1.5px solid var(--border);
    padding: 5px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #clearHistoryBtn:active { opacity: 0.5; }

  #historyList {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .history-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .1s;
  }
  .history-item:active { background: rgba(0,0,0,0.04); }

  .history-item-text {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--ink);
    letter-spacing: 0.03em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-item-arrow {
    font-size: 0.75rem;
    color: var(--border);
    flex-shrink: 0;
  }

  #historyEmpty {
    padding: 32px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--border);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
  }

  #closeHistory {
    background: transparent;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 5px 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Panel ── */
  #panel {
    border-top: 2px solid var(--ink);
    background: var(--bg);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }

  #msgInput {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    padding: 8px 4px;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
    letter-spacing: 0.03em;
  }
  #msgInput::placeholder { color: var(--muted); font-size: 0.88rem; }
  #msgInput:focus { border-bottom-color: var(--ink); }

  #btn-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  #speedRange {
    -webkit-appearance: none;
    width: 68px;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  #speedRange::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
  }

  #action-btns { display: flex; gap: 8px; }

  #sendBtn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .15s;
    -webkit-tap-highlight-color: transparent;
  }
  #sendBtn:active { opacity: 0.45; }

  #clearBtn {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #clearBtn:active { opacity: 0.5; }
</style>
</head>
<body>

<div id="app">

  <!-- Topbar -->
  <div id="topbar">
    <div id="modeToggle">
      <button class="mode-btn active" id="btnNormal" onclick="setMode('normal')">Normal</button>
      <button class="mode-btn" id="btnBig" onclick="setMode('big')">Entreno</button>
    </div>
    <button id="historyToggle" onclick="openHistory()">Historial</button>
  </div>

  <!-- Board -->
  <div id="board">

    <!-- Tracks (modo normal) -->
    <div id="tracks"></div>

    <!-- Track grande (modo entrenamiento) -->
    <div id="big-inner">
      <span id="big-placeholder">—</span>
    </div>

    <!-- Historial overlay -->
    <div id="historyPanel">
      <div id="historyHeader">
        <span>Historial</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <button id="clearHistoryBtn" onclick="clearHistory()">Borrar todo</button>
          <button id="closeHistory" onclick="closeHistory()">Cerrar</button>
        </div>
      </div>
      <div id="historyList"></div>
    </div>

  </div>

  <!-- Panel -->
  <div id="panel">
    <input id="msgInput" type="text" placeholder="Escribí tu mensaje…" autocomplete="off" />
    <div id="btn-row">
      <div id="controls">
        <span>vel</span>
        <input type="range" id="speedRange" min="0.5" max="5" value="1.5" step="0.5">
      </div>
      <div id="action-btns">
        <button id="clearBtn" onclick="clearAll()">Limpiar</button>
        <button id="sendBtn" onclick="send()">Enviar</button>
      </div>
    </div>
  </div>

</div>

<script>
  const TRACK_COUNT = 5;
  const tracksEl = document.getElementById('tracks');
  const bigInner = document.getElementById('big-inner');
  const board = document.getElementById('board');
  const input = document.getElementById('msgInput');
  const speedRange = document.getElementById('speedRange');
  const historyPanel = document.getElementById('historyPanel');
  const historyList = document.getElementById('historyList');
  const historyToggle = document.getElementById('historyToggle');

  let mode = 'normal';
  let history = [];
  let nextTrack = 0;
  let bigAnim = null;

  // ── Build normal tracks ──
  const tracks = [];
  for (let i = 0; i < TRACK_COUNT; i++) {
    const track = document.createElement('div');
    track.className = 'track';

    const num = document.createElement('div');
    num.className = 'track-num';
    num.textContent = String(i + 1).padStart(2, '0');

    const inner = document.createElement('div');
    inner.className = 'track-inner';

    const ph = document.createElement('span');
    ph.className = 'track-placeholder';
    ph.textContent = '—';
    inner.appendChild(ph);

    track.appendChild(inner);
    track.appendChild(num);
    tracksEl.appendChild(track);
    tracks.push({ el: track, inner, ph, anim: null });
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  // ── Mode toggle ──
  function setMode(m) {
    mode = m;
    document.getElementById('btnNormal').classList.toggle('active', m === 'normal');
    document.getElementById('btnBig').classList.toggle('active', m === 'big');
    board.classList.toggle('big', m === 'big');
    tracksEl.style.display = m === 'normal' ? 'block' : 'none';
    clearAll();
  }

  // ── Send ──
  function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addToHistory(text);
    if (mode === 'normal') {
      const t = tracks[nextTrack % TRACK_COUNT];
      nextTrack++;
      startMarquee(t.inner, text, false);
    } else {
      startMarquee(bigInner, text, true);
    }
  }

  // ── Clear ──
  function clearAll() {
    if (mode === 'normal') {
      tracks.forEach(t => {
        if (t.anim) { cancelAnimationFrame(t.anim); t.anim = null; }
        resetInner(t.inner, false);
      });
      nextTrack = 0;
    } else {
      if (bigAnim) { cancelAnimationFrame(bigAnim); bigAnim = null; }
      resetInner(bigInner, true);
    }
  }

  function resetInner(inner, isBig) {
    inner.innerHTML = '';
    inner.style.transform = 'translateY(-50%)';
    const ph = document.createElement('span');
    ph.className = isBig ? '' : 'track-placeholder';
    if (isBig) { ph.id = 'big-placeholder'; }
    ph.textContent = '—';
    if (isBig) { ph.style.cssText = 'font-family:"DM Mono",monospace;font-size:.75rem;color:var(--border);letter-spacing:.14em;text-transform:uppercase;padding-left:28px;user-select:none;'; }
    inner.appendChild(ph);
  }

  // ── Marquee ──
  function startMarquee(inner, text, isBig) {
    inner.innerHTML = '';

    for (let i = 0; i < 5; i++) {
      const span = document.createElement('span');
      span.className = 'track-text';
      span.textContent = text;
      const sep = document.createElement('span');
      sep.className = 'track-sep';
      sep.textContent = '·';
      inner.appendChild(span);
      inner.appendChild(sep);
    }

    inner.style.transform = 'translateY(-50%)';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        inner.querySelectorAll('.track-text, .track-sep').forEach(el => el.classList.add('visible'));

        const unitW = inner.children[0].offsetWidth + inner.children[1].offsetWidth;
        if (unitW === 0) return;

        let x = 0;
        let last = null;

        function tick(ts) {
          if (!last) last = ts;
          const dt = Math.min(ts - last, 50);
          last = ts;

          const pxPerSec = parseFloat(speedRange.value) * 55;
          x -= (pxPerSec * dt) / 1000;
          if (x <= -unitW) x += unitW;

          inner.style.transform = `translateX(${x}px) translateY(-50%)`;

          if (isBig) {
            bigAnim = requestAnimationFrame(tick);
          } else {
            // find track and store anim
            const t = tracks.find(t => t.inner === inner);
            if (t) t.anim = requestAnimationFrame(tick);
          }
        }

        if (isBig) {
          bigAnim = requestAnimationFrame(tick);
        } else {
          const t = tracks.find(t => t.inner === inner);
          if (t) t.anim = requestAnimationFrame(tick);
        }
      });
    });
  }

  // ── History ──
  function addToHistory(text) {
    if (history.includes(text)) {
      history = history.filter(h => h !== text);
    }
    history.unshift(text);
    historyToggle.classList.add('has-items');
    renderHistory();
  }

  function renderHistory() {
    historyList.innerHTML = '';
    if (history.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'historyEmpty';
      empty.textContent = 'Sin mensajes aún';
      historyList.appendChild(empty);
      historyToggle.classList.remove('has-items');
      return;
    }
    history.forEach(text => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <span class="history-item-text">${text}</span>
        <span class="history-item-arrow">▶</span>
      `;
      item.addEventListener('click', () => {
        closeHistory();
        input.value = text;
        send();
      });
      historyList.appendChild(item);
    });
  }

  function openHistory() {
    renderHistory();
    historyPanel.classList.add('open');
  }

  function closeHistory() {
    historyPanel.classList.remove('open');
  }

  function clearHistory() {
    history = [];
    renderHistory();
    historyToggle.classList.remove('has-items');
  }

  // Init
  setMode('normal');
</script>
</body>
</html>
